name: Release dry-run

# release.yml only runs on tag push, so nothing else ever exercises its action
# pins or .goreleaser.yaml before a real release. This workflow runs the same
# steps with `--snapshot` — full multi-platform build, archives, SBOMs, local
# docker images — but tags nothing, pushes nothing, publishes nothing.
#
# Triggers automatically on PRs that touch the release path (including
# Dependabot action bumps) and manually via workflow_dispatch.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/release-dryrun.yml"
      - ".goreleaser.yaml"
      - "Dockerfile.goreleaser"

# Read-only everywhere: a dry run must not be able to publish even by accident.
permissions:
  contents: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      # Every `uses:` pin below must stay identical to release.yml — proving
      # those exact pins still work is this workflow's whole purpose.
      # Dependabot updates both files in the same PR, so they stay in step.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Exercised for parity with release.yml; the token is read-only and the
      # snapshot never pushes, so this can only ever pull.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # syft generates the per-archive SBOMs declared in .goreleaser.yaml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser (snapshot — build everything, publish nothing)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2.17.0" # keep in step with release.yml; see RELEASING.md
          # --snapshot already disables publishing; the explicit skips are
          # belt-and-suspenders (signing also needs OIDC we don't grant here).
          args: release --snapshot --clean --skip=sign,publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show what a release would have produced
        run: ls -l dist/
