ShortDescription: Test any RADIUS server — FreeRADIUS, Windows NPS, or cloud — from inside your network.
Description: >-
  authhound-probe runs a real authentication against your RADIUS server from
  inside your network, acting as a NAS (switch/AP) would, and tells you in plain
  English which hop is broken: reachability, shared-secret verification, PAP,
  PEAP-MSCHAPv2, EAP-TTLS, EAP-TLS, server-certificate analysis, path-MTU /
  fragmentation, and RadSec. Read-only, no account, no telemetry — a single
  static binary. Add --json and exit codes for scripting, RMM, and Scheduled
  Tasks.
Moniker: authhound-probe
