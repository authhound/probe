# A throwaway FreeRADIUS lab for exercising authhound-probe end-to-end:
# classic RADIUS/UDP (PAP, PEAP-MSCHAPv2, EAP-TTLS, EAP-TLS) on 1812, and
# RadSec (RADIUS/TLS) on 2083.
#
#   docker compose -f test/lab/docker-compose.yml up      # start (Ctrl-C to stop)
#   docker compose -f test/lab/docker-compose.yml down     # remove
#
# Linux only: it uses host networking so the probe reaches it as 127.0.0.1,
# matching FreeRADIUS's default localhost client and the RadSec client entry.
# On macOS/Windows, run the probe from inside a container on the same network,
# or add a client entry for your Docker bridge subnet.
#
# `-fxx -l stdout` runs FreeRADIUS in the foreground with debug AND threading —
# threading is REQUIRED for the RadSec TLS socket ('-X' is single-threaded and
# refuses to open it). Test certs are generated on first boot; see test/README.md
# for extracting a client cert for the EAP-TLS / RadSec tests.
services:
  freeradius:
    image: freeradius/freeradius-server:latest
    # Enable copy_request_to_tunnel + use_tunneled_reply so PEAP/TTLS carry the
    # request's NAS-Port-Type into the inner tunnel and copy the inner reply's
    # VLAN out to the outer Access-Accept — how real 802.1X VLAN assignment works,
    # and what lets `--expect-vlan` verify it over EAP (not just PAP).
    entrypoint: ["sh", "-c", "sed -i -E 's/(use_tunneled_reply|copy_request_to_tunnel) = no/\\1 = yes/' /etc/raddb/mods-available/eap && exec freeradius -fxx -l stdout"]
    network_mode: host
    volumes:
      - ./config/authorize:/etc/raddb/mods-config/files/authorize:ro
      - ./config/radsec:/etc/raddb/sites-enabled/radsec:ro

  # A second RADIUS server, for exercising multi-server comparison
  # (`radius test --server 127.0.0.1,127.0.0.1:11814`). It's the fixture for the
  # split-brain story: stop this one and the comparison verdict flips to
  # "primary healthy, secondary NOT responding — ~50% of auths would fail".
  # Bridge network with a published port so it doesn't clash with the host-net
  # primary; requests arrive from the bridge gateway, so it accepts any source IP
  # (throwaway lab secret, never production).
  #
  #   docker compose -f test/lab/docker-compose.yml up   # brings up both servers
  #   authhound-probe radius test --server 127.0.0.1,127.0.0.1:11814 --secret testing123
  freeradius-secondary:
    image: freeradius/freeradius-server:latest
    command: ["-fxx", "-l", "stdout"]
    ports:
      - "127.0.0.1:11814:1812/udp"
    volumes:
      - ./config/authorize:/etc/raddb/mods-config/files/authorize:ro
      - ./config/clients-flaky:/etc/raddb/clients.conf:ro

  # Flaky profile: the same FreeRADIUS behind induced packet loss and jitter,
  # for exercising `radius test --count` against genuinely intermittent
  # failures. Runs on a bridge network (not host) so netem can shape just this
  # server's traffic; published on 127.0.0.1:11812.
  #
  #   docker compose -f test/lab/docker-compose.yml --profile flaky up
  #   authhound-probe radius test --server 127.0.0.1:11812 --secret testing123 \
  #       --pap alice:pw --count 10
  #
  # Requests reach it from the Docker bridge gateway, so clients-flaky accepts
  # any source IP (throwaway lab secret, never production).
  freeradius-flaky:
    image: freeradius/freeradius-server:latest
    profiles: [flaky]
    command: ["-fxx", "-l", "stdout"]
    ports:
      - "127.0.0.1:11812:1812/udp"
    volumes:
      - ./config/authorize:/etc/raddb/mods-config/files/authorize:ro
      - ./config/clients-flaky:/etc/raddb/clients.conf:ro

  # Unhardened profile: an OLDER FreeRADIUS (3.2.3) that predates the
  # CVE-2024-3596 ("BlastRADIUS") reply-signing fix. It accepts the probe's
  # signed Access-Request but replies WITHOUT a Message-Authenticator, so
  # `radius test` reports the BlastRADIUS posture check as WARN (unsigned) —
  # the state most un-upgraded servers are still in. The current `latest`
  # server above signs its replies and reports PASS.
  #
  #   docker compose -f test/lab/docker-compose.yml --profile unhardened up
  #   authhound-probe radius test --server 127.0.0.1:11813 --secret testing123
  #
  # Bridge network with a published port (so it doesn't clash with the host-net
  # server); requests arrive from the bridge gateway, so it accepts any source IP
  # (throwaway lab secret, never production). Note the 3.2.x image's config dir is
  # /etc/freeradius, not /etc/raddb.
  freeradius-unhardened:
    image: freeradius/freeradius-server:3.2.3
    profiles: [unhardened]
    command: ["-fxx", "-l", "stdout"]
    ports:
      - "127.0.0.1:11813:1812/udp"
    volumes:
      - ./config/authorize:/etc/freeradius/mods-config/files/authorize:ro
      - ./config/clients-flaky:/etc/freeradius/clients.conf:ro

  # netem sidecar: joins the flaky server's network namespace and drops ~25% of
  # its replies with 30ms±20ms delay — lost requests and latency jitter, the two
  # things --count exists to expose. NET_ADMIN is scoped to the sidecar and that
  # one namespace, not the host.
  netem:
    image: alpine:3
    profiles: [flaky]
    network_mode: "service:freeradius-flaky"
    cap_add: [NET_ADMIN]
    command: >
      sh -c "apk add --no-cache iproute2 >/dev/null
      && tc qdisc replace dev eth0 root netem loss 25% delay 30ms 20ms
      && echo 'netem active: 25% loss, 30ms±20ms delay'
      && sleep infinity"
